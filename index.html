<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>刑诉口诀随机抽背</title>
  <style>
    :root { --bg:#f6f7f9; --panel:#fff; --text:#172033; --muted:#667085; --line:#d8dee8; --accent:#0f766e; --weak:#dff5f1; --good:#047857; --warn:#9a3412; --bad:#b42318; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; font-family:"Microsoft YaHei","PingFang SC",system-ui,sans-serif; color:var(--text); background:var(--bg); }
    .app { width:min(1040px, calc(100vw - 32px)); margin:0 auto; padding:28px 0 40px; }
    header { display:flex; justify-content:space-between; gap:18px; align-items:end; padding-bottom:18px; border-bottom:1px solid var(--line); }
    h1 { margin:0; font-size:28px; line-height:1.2; }
    .sub { margin-top:8px; color:var(--muted); font-size:14px; }
    .stats { display:grid; grid-template-columns:repeat(3,minmax(84px,1fr)); gap:8px; min-width:300px; }
    .stat { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:10px 12px; text-align:center; }
    .stat strong { display:block; font-size:20px; }
    .stat span { color:var(--muted); font-size:12px; }
    .controls { display:grid; grid-template-columns:1.2fr 1fr auto auto; gap:10px; margin:18px 0; }
    select,input,button { height:40px; border-radius:8px; border:1px solid var(--line); background:var(--panel); color:var(--text); font-size:14px; padding:0 12px; }
    button { cursor:pointer; font-weight:600; }
    .primary { background:var(--accent); color:white; border-color:var(--accent); }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:22px; min-height:360px; display:grid; gap:16px; }
    .badge { display:inline-flex; width:fit-content; max-width:100%; padding:5px 10px; border-radius:999px; background:var(--weak); color:var(--accent); font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .prompt { color:var(--muted); font-size:18px; line-height:1.7; }
    .answer { border:1px dashed var(--line); border-radius:8px; padding:20px; font-size:30px; line-height:1.55; font-weight:700; min-height:132px; display:flex; align-items:center; }
    .hidden-answer { color:var(--muted); font-size:18px; font-weight:500; }
    .source { color:var(--muted); font-size:13px; line-height:1.6; border-top:1px solid var(--line); padding-top:12px; }
    .actions { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
    .good { color:var(--good); border-color:#a7f3d0; background:#ecfdf5; }
    .warn { color:var(--warn); border-color:#fed7aa; background:#fff7ed; }
    .bad { color:var(--bad); border-color:#fecaca; background:#fff1f2; }
    .list { margin-top:18px; background:var(--panel); border:1px solid var(--line); border-radius:8px; overflow:hidden; }
    .list summary { cursor:pointer; padding:14px 16px; font-weight:700; }
    .rows { max-height:360px; overflow:auto; border-top:1px solid var(--line); }
    .row { display:grid; grid-template-columns:72px 1fr; gap:10px; padding:10px 16px; border-bottom:1px solid #edf0f5; font-size:14px; line-height:1.5; }
    .idx { color:var(--muted); }
    @media (max-width:760px) { header{display:block}.stats{min-width:0;margin-top:16px}.controls{grid-template-columns:1fr}.actions{grid-template-columns:1fr 1fr}.answer{font-size:23px} }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>刑诉口诀随机抽背</h1>
        <div class="sub">来源：《刑事诉讼法》精华记忆口诀.md，共 <span id="totalText"></span> 条。离线可用。</div>
      </div>
      <div class="stats">
        <div class="stat"><strong id="seen">0</strong><span>已抽</span></div>
        <div class="stat"><strong id="ok">0</strong><span>掌握</span></div>
        <div class="stat"><strong id="again">0</strong><span>待复习</span></div>
      </div>
    </header>
    <section class="controls">
      <select id="section"></select>
      <input id="keyword" placeholder="关键词过滤，如：回避、取保、二审">
      <button id="reset">重置记录</button>
      <button id="draw" class="primary">随机抽题</button>
    </section>
    <section class="card">
      <span class="badge" id="badge">准备开始</span>
      <div class="prompt" id="prompt">点击“随机抽题”。先看考点提示，默背口诀，再点“显示答案”。</div>
      <div class="answer hidden-answer" id="answer">答案会显示在这里</div>
      <div class="actions">
        <button id="show">显示答案</button>
        <button id="know" class="good">掌握</button>
        <button id="fuzzy" class="warn">模糊</button>
        <button id="miss" class="bad">没背出</button>
      </div>
      <div class="source" id="source">快捷键：Space 抽题/显示答案，1 掌握，2 模糊，3 没背出。</div>
    </section>
    <details class="list">
      <summary>查看当前过滤范围内的全部口诀</summary>
      <div class="rows" id="rows"></div>
    </details>
  </main>

    function sections(){ return ["全部章节", ...Array.from(new Set(CARDS.map(c => c.section))).filter(Boolean)]; }
    function filtered(){
      const sec = sectionEl.value;
      const key = keywordEl.value.trim();
      return CARDS.filter(c => (sec === "全部章节" || c.section === sec) && (!key || [c.section,c.prompt,c.answer,c.source].join(" ").includes(key)));
    }
    function choose(){
      const pool = filtered();
      if (!pool.length) return null;
      const weighted = [];
      for (const card of pool) {
        const rec = state[card.answer] || {};
        const w = rec.last === "miss" ? 6 : rec.last === "fuzzy" ? 3 : rec.last === "know" ? 1 : 4;
        for (let i=0;i<w;i++) weighted.push(card);
      }
      return weighted[Math.floor(Math.random() * weighted.length)];
    }
    function renderCard(card){
      current = card; answerShown = false;
      if (!card) {
        $("badge").textContent = "没有匹配结果";
        $("prompt").textContent = "换一个章节或关键词。";
        $("answer").textContent = "无";
        $("answer").className = "answer hidden-answer";
        $("source").textContent = "";
        return;
      }
      $("badge").textContent = card.section + " · 第 " + (CARDS.indexOf(card)+1) + " 条";
      $("prompt").textContent = card.prompt || "背诵口诀";
      $("answer").textContent = "先默背，再显示答案";
      $("answer").className = "answer hidden-answer";
      $("source").textContent = "原条目：" + card.source;
      state[card.answer] = { ...(state[card.answer] || {}), seen: (state[card.answer]?.seen || 0) + 1 };
      save(); renderStats();
    }
    function showAnswer(){ if(!current) return; answerShown = true; $("answer").textContent = current.answer; $("answer").className = "answer"; }
    function mark(kind){ if(!current) return; state[current.answer] = { ...(state[current.answer] || {}), last: kind, at: Date.now(), seen: state[current.answer]?.seen || 1 }; save(); renderStats(); renderCard(choose()); }
    function renderStats(){ const values = Object.values(state); $("seen").textContent = values.filter(v=>v.seen).length; $("ok").textContent = values.filter(v=>v.last==="know").length; $("again").textContent = values.filter(v=>v.last==="fuzzy"||v.last==="miss").length; }
    function escapeHtml(s){ return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
    function renderRows(){ $("rows").innerHTML = filtered().map(c => '<div class="row"><div class="idx">#'+(CARDS.indexOf(c)+1)+'</div><div><strong>'+escapeHtml(c.prompt)+'</strong><br>'+escapeHtml(c.answer)+'</div></div>').join(""); }
    for (const s of sections()) { const opt = document.createElement("option"); opt.value = s; opt.textContent = s; sectionEl.appendChild(opt); }
    $("draw").onclick = () => renderCard(choose());
    $("show").onclick = showAnswer;
    $("know").onclick = () => mark("know");
    $("fuzzy").onclick = () => mark("fuzzy");
    $("miss").onclick = () => mark("miss");
    $("reset").onclick = () => { if(confirm("清空本页背诵记录？")) { for (const k of Object.keys(state)) delete state[k]; save(); renderStats(); } };
    sectionEl.onchange = renderRows;
    keywordEl.oninput = renderRows;
    document.addEventListener("keydown", e => {
      if (e.target.tagName === "INPUT") return;
      if (e.code === "Space") { e.preventDefault(); answerShown ? renderCard(choose()) : (current ? showAnswer() : renderCard(choose())); }
      if (e.key === "1") mark("know");
      if (e.key === "2") mark("fuzzy");
      if (e.key === "3") mark("miss");
    });
    renderStats(); renderRows(); renderCard(choose());
  </script>
</body>
</html>
